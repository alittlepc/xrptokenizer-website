<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAW | Institutional Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-white border border-slate-200 shadow-2xl rounded-sm p-8">
        <div class="flex justify-between items-center mb-10 border-b border-slate-100 pb-6">
            <h1 class="text-xl font-black tracking-tighter text-slate-900">IAW <span class="font-normal text-slate-400">/ SOVEREIGN</span></h1>
            <span class="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-1 rounded-full uppercase tracking-widest">Live Node</span>
        </div>

        <div class="bg-slate-950 p-6 rounded-sm mb-8 text-white">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Institutional Fee</p>
            <p class="text-3xl font-light">0.33% <span class="text-sm text-slate-500">Fixed</span></p>
            <div class="mt-4 pt-4 border-t border-slate-800">
                <p class="text-[9px] font-mono text-slate-500 break-all uppercase">Hook: 07FD5D7ED928...</p>
            </div>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Merchant Legal Name</label>
                <input type="text" id="bizName" placeholder="e.g. Goldman & Co" 
                class="w-full border-b-2 border-slate-200 py-3 text-lg focus:border-slate-950 outline-none transition-colors placeholder:text-slate-200">
            </div>

            <button id="mintBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 text-sm uppercase tracking-widest transition-all shadow-lg active:scale-[0.98]">
                Initialize Rail
            </button>
        </div>

        <div id="resultArea" class="hidden mt-10 text-center border-t border-slate-100 pt-8 animate-pulse">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Awaiting Xaman Authorization</p>
            <div id="qrContainer" class="inline-block p-4 border border-slate-100 rounded-sm bg-slate-50">
                </div>
            <p class="mt-4 text-xs text-blue-600 font-bold uppercase tracking-tight">Open Xaman to Sign</p>
        </div>
    </div>

    <script>
        document.getElementById('mintBtn').addEventListener('click', async () => {
            const name = document.getElementById('bizName').value;
            if (!name) return alert("Business Name Required");

            const btn = document.getElementById('mintBtn');
            const resArea = document.getElementById('resultArea');
            const qrCont = document.getElementById('qrContainer');

            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            // DIRECT FETCH TO XAMAN API - NO SDK REQUIRED
            try {
                const response = await fetch('https://xumm.app/api/v1/platform/payload', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': 'd0ecc892-9b58-40d0-a567-62e4781312f0'
                    },
                    body: JSON.stringify({
                        txjson: {
                            "TransactionType": "MPTokenIssuanceCreate",
                            "AssetScale": 6,
                            "TransferFee": 330,
                            "MPTokenMetadata": btoa(name),
                            "Flags": 1,
                            "Hooks": [{ "Hook": { "HookHash": "07FD5D7ED928F5C441E4CFBCEF907FF640B8368915080F9EC97D5241B65FB824" } }]
                        }
                    })
                });

                const data = await response.json();

                if (data.refs && data.refs.qr_png) {
                    resArea.classList.remove('hidden');
                    qrCont.innerHTML = `<img src="${data.refs.qr_png}" width="200" class="mx-auto">`;
                    btn.innerText = "PAYLOAD ACTIVE";
                    
                    // Force the deep link for mobile
                    setTimeout(() => {
                        window.location.href = data.next.always;
                    }, 1500);
                }
            } catch (err) {
                console.error(err);
                btn.innerText = "RETRY";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
