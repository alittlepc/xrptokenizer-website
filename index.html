<!DOCTYPE html>
<html>
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://xumm.app/assets/cdn/xumm-xapp-sdk.js"></script>
    <title>Innovative App World</title>
</head>
<body style="background:#000; color:#fff; font-family:sans-serif; text-align:center; padding: 10% 5%; opacity:0; transition: opacity 0.5s;">
    
    <h1 style="color:#00ff00; letter-spacing: 2px; font-size: 1.8em;">INNOVATIVE APP WORLD</h1>
    <p style="font-size: 1.1em; color: #bbb;">Institutional RLUSD Infrastructure</p>
    
    <div style="border: 1px solid #333; padding: 20px; border-radius: 15px; background: #111; margin-top: 20px;">
        <h2 style="font-size: 1em; color: #00ff00;">MPT TOKENIZER v1.0</h2>
        <p style="font-size: 0.9em;">Status: <span style="color:#00ff00;">● DOMAIN VERIFIED</span></p>
        <hr style="border: 0.5px solid #222; margin: 15px 0;">
        
        <button onclick="mintIAWToken()" style="background:#00ff00; color:#000; border:none; padding: 18px 35px; font-weight:bold; cursor:pointer; border-radius: 8px; font-size: 1.2em; width: 100%; box-shadow: 0 4px 15px rgba(0,255,0,0.2);">
            MINT IAW TEST TOKEN
        </button>
        
        <p style="font-size: 0.75em; color: #666; margin-top: 15px;">
            Fee: 0.33% | Split: 66/33 | Ledger: XAHAU
        </p>
    </div>

    <script>
      const sdk = new XummXappSdk();

      // Handshake to kill the loading screen
      sdk.on('ready', () => {
        document.body.style.opacity = "1";
      });

      async function mintIAWToken() {
        try {
          // 1. Create the Minting Payload
          const payload = {
            txjson: {
              TransactionType: "MPTokenIssuance",
              Account: sdk.getAccount(), 
              MPTokenFlags: 1,      // 1 = Allow Indefinite Minting
              TransferFee: 330,     // 330 = 0.33% (0 to 50000 range)
              AssetScale: 6,        // Matches RLUSD decimal precision
              MPTokenMetadata: "49415720496E737469747574696F6E616C205261696C" // Hex for "IAW Institutional Rail"
            }
          };

          // 2. Push to Xaman for Signature
          const request = await sdk.payload.create(payload);
          
          if (request && request.next && request.next.always) {
            sdk.openSignRequest(request.next.always);
          }
        } catch (err) {
          alert("Connection Error. Check Xaman Sandbox Settings.");
        }
      }
    </script>
</body>
</html>
