<!DOCTYPE html>
<html>
<head>
    <title>XRPTokenizer.com | KYC-Verified Mint</title>
    <script src="https://xumm.app/assets/cdn/xumm-oauth2-pkce.js"></script>
    <script src="https://unpkg.com/xrpl@latest/build/xrpl-latest-min.js"></script>
</head>
<body style="background:#0f172a; color:white; font-family:sans-serif; text-align:center;">
    <h1>Institutional RWA Mint</h1>
    <div id="auth-section">
        <button id="auth-btn" onclick="connectWallet()">Link Verified Xaman Profile (KYC)</button>
    </div>
    
    <div id="mint-section" style="display:none; margin-top:50px;">
        <input type="text" id="assetName" placeholder="Asset Name (e.g. Florida Property #101)">
        <button onclick="signMint()">Mint Institutional Asset (0.33% Fee)</button>
    </div>

    <script>
        const xumm = new XummPkce('YOUR_API_KEY'); // Get this from Xaman Developer Console

        async function connectWallet() {
            const auth = await xumm.authorize();
            if (auth.me.kycApproved) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('mint-section').style.display = 'block';
                console.log("KYC Verified User:", auth.me.account);
            } else {
                alert("Institutional Minting requires Xaman KYC verification.");
            }
        }

        async function signMint() {
            const asset = document.getElementById('assetName').value;
            // 1. Construct the MPT Mint with Flag 64 (Clawback)
            const tx = {
                "TransactionType": "MPTokenIssuanceCreate",
                "Account": xumm.getAccount(), // The User's Wallet
                "Flags": 64, // THE FABIO STANDARD
                "MPTokenMetadata": xrpl.convertStringToHex(asset),
                "TransferFee": 330 // 0.33%
            };
            
            // 2. Request Signature
            // The user signs, pays the fee to your Treasury, and receives the token.
            await xumm.payload.create(tx);
        }
    </script>
</body>
</html>
