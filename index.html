<!DOCTYPE html>
<html>
<head>
    <title>IAW TERMINAL</title>
    <script src="https://xumm.app/assets/cdn/xumm-oauth2-pkce.js"></script>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #fff; color: #000; }
        .container { max-width: 500px; margin: auto; border: 5px solid #000; padding: 30px; }
        h1 { font-size: 40px; margin: 0; font-style: italic; }
        input { width: 90%; padding: 15px; margin: 20px 0; border: 3px solid #000; font-size: 20px; font-weight: bold; }
        button { width: 100%; padding: 20px; background: #000; color: #fff; font-size: 24px; font-weight: bold; cursor: pointer; border: none; }
        button:disabled { background: #ccc; }
        .fee-box { background: #eee; padding: 15px; border-left: 10px solid #000; margin-bottom: 20px; }
        #qr-box { margin-top: 30px; text-align: center; display: none; }
        img { border: 2px solid #000; }
    </style>
</head>
<body>

<div class="container">
    <h1>IAW HUB</h1>
    <p><b>XAHAU PROTOCOL ACTIVE</b></p>
    <hr>
    
    <div class="fee-box">
        <b>INSTITUTIONAL TOLL: 0.33%</b><br>
        <small>HOOK: 07FD5D7E...</small>
    </div>

    <label>MERCHANT NAME:</label>
    <input type="text" id="merchantName" placeholder="ENTER NAME">

    <button id="mainAction" disabled>INITIALIZE MINT</button>

    <div id="qr-box">
        <p><b>SCAN WITH XAMAN:</b></p>
        <div id="qrFrame"></div>
        <p id="status">WAITING...</p>
    </div>
</div>

<script>
    // YOUR API KEY
    const xumm = new Xumm('d0ecc892-9b58-40d0-a567-62e4781312f0');

    const input = document.getElementById('merchantName');
    const btn = document.getElementById('mainAction');
    const qrBox = document.getElementById('qr-box');
    const qrFrame = document.getElementById('qrFrame');
    const status = document.getElementById('status');

    input.oninput = () => { btn.disabled = input.value.length < 2; };

    btn.onclick = async () => {
        btn.innerText = "CONNECTING...";
        qrBox.style.display = 'block';
        
        try {
            const payload = {
                txjson: {
                    "TransactionType": "MPTokenIssuanceCreate",
                    "AssetScale": 6,
                    "TransferFee": 330,
                    "MPTokenMetadata": btoa(input.value),
                    "Flags": 1
                }
            };

            const response = await xumm.payload.create(payload);

            if (response && response.refs) {
                qrFrame.innerHTML = `<img src="${response.refs.qr_png}" width="250">`;
                status.innerText = "SIGNATURE REQUIRED";
                
                // If on mobile, this jumps to Xaman automatically
                if (window.innerWidth < 768) {
                    window.location.href = response.next.always;
                }
            }
        } catch (e) {
            status.innerText = "ERROR - REFRESH";
        }
    };
</script>

</body>
</html>
