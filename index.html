<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAW | Institutional Tokenizer</title>
    <script src="https://xumm.app/assets/cdn/xumm-oauth2-pkce.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0c10;
            --bg-surface: #14171c;
            --accent-gold: #c5a059;
            --text-main: #f0f0f0;
            --text-dim: #94a3b8;
            --border: #2d333b;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--accent-gold);
            margin: 0;
        }

        .header p {
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px 0 30px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: left;
        }

        .label {
            font-size: 10px;
            color: var(--accent-gold);
            text-transform: uppercase;
            font-weight: 600;
        }

        .value {
            font-family: monospace;
            font-size: 13px;
            margin-top: 5px;
            color: var(--text-main);
            word-break: break-all;
        }

        .btn-primary {
            width: 100%;
            background: var(--accent-gold);
            color: var(--bg-deep);
            border: none;
            padding: 16px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            filter: brightness(1.2);
        }

        #status {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Innovative App World</h1>
        <p>Institutional Rail v2.2</p>
    </div>

    <div class="card">
        <div class="label">Authorized Publisher</div>
        <div class="value">Innovative App World LLC</div>
    </div>

    <div class="card">
        <div class="label">Protocol Logic</div>
        <div class="value">0.33% Institutional Toll</div>
    </div>

    <button class="btn-primary" id="launchBtn" onclick="initLaunch()">
        Authorize & Install Hook
    </button>

    <div id="status">Ready to authorize via Xaman...</div>
</div>

<script>
    // 1. REPLACE THIS WITH YOUR XAMAN API KEY
    const xumm = new XummPkce('PASTE_YOUR_API_KEY_HERE');

    async function initLaunch() {
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('launchBtn');
        
        statusDiv.innerText = "Opening Xaman...";
        btn.disabled = true;

        try {
            const auth = await xumm.authorize();
            
            if (auth.me.account) {
                statusDiv.innerText = "Connected: " + auth.me.account;
                
                // 2. THIS IS THE TRANSACTION PAYLOAD
                const payload = {
                    TransactionType: "SetHook",
                    Hooks: [
                        {
                            Hook: {
                                // 3. REPLACE THIS WITH YOUR PUBLISHED HOOK HASH
                                HookHash: "PASTE_YOUR_HOOK_HASH_HERE",
                                HookOn: "0000000000000000",
                                HookNamespace: "IAW_RAIL",
                                HookApiVersion: 0
                            }
                        }
                    ]
                };

                const created = await xumm.payload.create(payload);
                
                if (created.next.always) {
                    statusDiv.innerText = "Please sign the request in Xaman.";
                    window.open(created.next.always, '_blank');
                }
            }
        } catch (e) {
            statusDiv.innerText = "Error: " + e.message;
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
