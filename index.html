<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAW | Institutional MPT Gateway</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --panel: #111111; --green: #00ff88; }
        body { 
            background: var(--bg); 
            color: #ffffff; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .dashboard { 
            background: var(--panel); 
            border: 1px solid #222; 
            padding: 3.5rem; 
            border-radius: 16px; 
            max-width: 550px; 
            width: 90%; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
            text-align: center;
            border-top: 4px solid var(--gold);
        }
        h1 { 
            color: var(--gold); 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            font-weight: 200; 
            margin: 0; 
            font-size: 1.6rem; 
        }
        .tagline { color: #666; font-size: 0.75rem; margin-top: 0.5rem; letter-spacing: 3px; text-transform: uppercase; }
        .divider { height: 1px; background: #222; margin: 2.5rem 0; position: relative; }
        .divider::after { content: ''; position: absolute; top: 0; left: 25%; width: 50%; height: 1px; background: var(--gold); }
        
        .address-container { background: #000; padding: 1.5rem; border-radius: 12px; border: 1px solid #1a1a1a; margin-bottom: 2rem; }
        .label { color: var(--gold); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 0.75rem; }
        
        /* CONTROLLED MONOSPACE FONT FOR R-ADDRESS */
        .r-address { 
            font-family: 'JetBrains Mono', 'Courier New', monospace; 
            color: var(--green); 
            font-size: 1.05rem; 
            word-break: break-all; 
            letter-spacing: 0.5px;
        }

        .metrics { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; }
        .metric-pill { background: #1a1a1a; padding: 0.6rem 1.2rem; border-radius: 100px; font-size: 0.75rem; color: #aaa; border: 1px solid #222; }
        .metric-pill b { color: var(--gold); }

        .status-footer { font-size: 0.7rem; color: #444; margin-top: 3rem; letter-spacing: 1px; }
        .blink { height: 6px; width: 6px; background: var(--green); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Innovative App World</h1>
        <div class="tagline">Native MPT Utility Protocol</div>
        
        <div class="divider"></div>
        
        <div class="address-container">
            <span class="label">Primary Treasury Anchor</span>
            <div class="r-address">raMQedfvpoGgi1bGjpYc94ka5NH4UA3H7c</div>
        </div>

        <div class="metrics">
            <div class="metric-pill">Protocol: <b>MPT-Native</b></div>
            <div class="metric-pill">Fee: <b>0.33%</b></div>
        </div>

        <div class="status-footer">
            <span class="blink"></span> XAHAU MAINNET INFRASTRUCTURE READY | APRIL 2026
        </div>
    </div>
</body>
</html>
