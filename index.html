<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRPTokerizer | Institutional RWA Hub</title>
    <script src="https://xumm.app/assets/cdn/xumm-oauth2-pkce.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0b0f1a; --panel: #161b2a; --border: #2d3748; --success: #10b981; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .tool-box { background: var(--panel); width: 100%; max-width: 480px; border-radius: 16px; border: 1px solid var(--border); padding: 35px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); text-align: center; }
        .header { border-bottom: 1px solid var(--border); margin-bottom: 25px; padding-bottom: 20px; }
        h1 { margin: 0; font-size: 1.5rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1.5px; }
        .protocol-badge { display: inline-block; background: #064e3b; color: #34d399; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; margin-top: 10px; border: 1px solid #065f46; }
        .info-panel { background: #1e293b; border-left: 4px solid var(--success); padding: 15px; margin-bottom: 25px; font-size: 0.85rem; line-height: 1.6; text-align: left; border-radius: 4px; }
        .field { margin-bottom: 25px; text-align: left; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }
        input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: #0b0f1a; color: white; font-size: 1.25rem; box-sizing: border-box; font-weight: 700; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--primary); }
        .btn-action { width: 100%; padding: 18px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 1.1rem; box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39); }
        .btn-action:hover { background: #059669; transform: translateY(-1px); }
        #status { margin-top: 25px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #64748b; min-height: 40px; line-height: 1.4; }
    </small></style>
</head>
<body>

<div class="tool-box">
    <div class="header">
        <h1>XRPTokerizer</h1>
        <div class="protocol-badge">MPT XLS-68d | ON-DEMAND</div>
    </div>

    <div class="info-panel">
        <strong>IAW Protocol Active:</strong><br>
        • Collateral: 1:1 RLUSD (Hook-Verified)<br>
        • Safety: Flag 112 (Trade/Transfer/Clawback)<br>
        • Settlement: T-0 Atomic Issuance
    </div>

    <div class="field">
        <label>Amount of RWA to Issue</label>
        <input type="number" id="mintAmount" value="1.00" step="0.01" min="0.01">
    </div>

    <button class="btn-action" id="btnMain">Authorize & Mint</button>

    <div id="status">Secure Session Ready</div>
</div>

<script>
    /** * IAW HUB OFFICIAL PRODUCTION CONFIG 
     */
    const XUMM_API_KEY = 'd0ecc892-9b58-40d0-a567-62e4781312f0'; 
    const xumm = new XummPkce(XUMM_API_KEY);

    const statusDiv = document.getElementById('status');
    const btnMain = document.getElementById('btnMain');

    btnMain.onclick = async () => {
        const amount = document.getElementById('mintAmount').value;

        if (!amount || amount <= 0) {
            statusDiv.innerText = "Error: Invalid Amount";
            return;
        }

        statusDiv.innerText = "Requesting Xaman Verification...";

        try {
            // Initiate Identity Link
            await xumm.authorize();
            const state = await xumm.state();
            
            statusDiv.innerText = "Identity Linked. Building MPT Payload...";

            // BUILD ON-DEMAND MPT TRANSACTION
            const payload = {
                txjson: {
                    "TransactionType": "MPTokenIssuanceCreate",
                    "Account": state.me.account,
                    "AssetScale": 6,
                    "TransferFee": 330, // 0.33% Institutional Rail Fee
                    "MPTokenMetadata": "696e6e6f7661746976652d6170702d776f726c64", // "innovative-app-world"
                    "Flags": 112, // 16 (Trade) + 32 (Transfer) + 64 (Clawback)
                    "Memos": [
                        {
                            "Memo": {
                                "MemoData": "524c5553445f4241434b45445f4d494e54", // "RLUSD_BACKED_MINT"
                                "MemoType": "4941575f485542" // "IAW_HUB"
                            }
                        }
                    ]
                }
            };

            const request = await xumm.payload.create(payload);
            
            if (request.next.always) {
                statusDiv.innerHTML = `Payload Created.<br>Confirm in Xaman App.<br><small>Ref: ${request.uuid}</small>`;
                window.open(request.next.always, '_blank');
            }
        } catch (e) {
            statusDiv.style.color = "#ef4444";
            statusDiv.innerText = "Process Failed: " + e.message;
            console.error(e);
        }
    };
</script>

</body>
</html>
