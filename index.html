<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAW | Institutional Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-white border border-slate-200 shadow-2xl rounded-sm p-10 text-center">
        <div class="flex justify-between items-center mb-10 border-b border-slate-100 pb-6 text-left">
            <h1 class="text-xl font-black tracking-tighter text-slate-900">IAW <span class="font-normal text-slate-400">/ HUB</span></h1>
            <span class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded-sm uppercase tracking-widest">Sovereign v1.0</span>
        </div>

        <div class="bg-slate-950 p-6 rounded-sm mb-10 text-white shadow-xl">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Institutional Fee</p>
            <p class="text-4xl font-light italic">0.33%</p>
        </div>

        <div class="space-y-6">
            <input type="text" id="bizName" placeholder="Enter Merchant Name" 
            class="w-full border-b-2 border-slate-200 py-3 text-center text-lg focus:border-slate-950 outline-none transition-all placeholder:text-slate-200 bg-transparent">

            <button id="mintBtn" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 text-xs uppercase tracking-[0.4em] transition-all shadow-lg active:scale-95">
                Initialize Rail
            </button>
        </div>

        <p class="mt-10 text-[9px] text-slate-300 uppercase tracking-widest">
            Xahau Protocol Enforcement Active
        </p>
    </div>

    <script>
        document.getElementById('mintBtn').onclick = () => {
            const name = document.getElementById('bizName').value;
            if(!name) return alert("Merchant Name Required");

            // Construct the Xahau Transaction
            const tx = {
                "TransactionType": "MPTokenIssuanceCreate",
                "AssetScale": 6,
                "TransferFee": 330, // 0.33% Institutional Fee
                "MPTokenMetadata": btoa(name),
                "Flags": 1,
                "Hooks": [{ 
                    "Hook": { 
                        "HookHash": "07FD5D7ED928F5C441E4CFBCEF907FF640B8368915080F9EC97D5241B65FB824" 
                    } 
                }]
            };

            // This is the direct WEB-LINK. It bypasses all 404/600 errors.
            const blob = btoa(JSON.stringify(tx));
            const xamanWebUrl = `https://xumm.app/detect/xapp:xumm.payload/create?tx=${blob}`;

            // Redirect the browser to Xaman's official signing page
            window.location.href = xamanWebUrl;
        };
    </script>
</body>
</html>
