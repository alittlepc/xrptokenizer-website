<!DOCTYPE html>
<html>
<head>
    <title>IAW HUB TERMINAL</title>
    <script src="https://xumm.app/assets/cdn/xumm-oauth2-pkce.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #000; color: #00ff00; padding: 50px; text-align: center; }
        .terminal { border: 2px solid #00ff00; padding: 40px; display: inline-block; max-width: 500px; box-shadow: 0 0 20px #00ff00; }
        input { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 15px; width: 80%; font-size: 20px; margin: 20px 0; }
        button { background: #00ff00; color: #000; border: none; padding: 20px 40px; font-size: 22px; font-weight: bold; cursor: pointer; width: 100%; }
        button:hover { background: #00cc00; }
        #qr-display { margin-top: 30px; display: none; }
        .fee-tag { color: #fff; background: #333; padding: 5px; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>IAW_SOVEREIGN_HUB_v1</h1>
    <span class="fee-tag">PROTOCOL_FEE: 0.33% | HOOK_HASH: 07FD5D7E...</span>
    
    <label>MERCHANT_ID:</label><br>
    <input type="text" id="merchantName" placeholder="ENTER_NAME">
    
    <button id="mintBtn">INITIALIZE_MINT</button>

    <div id="qr-display">
        <p>SCAN_TO_DEPLOY_RAIL:</p>
        <div id="qrImage"></div>
        <p id="msg">WAITING_FOR_SIGNATURE...</p>
    </div>
</div>

<script>
    // INITIALIZE XAMAN
    const xumm = new Xumm('d0ecc892-9b58-40d0-a567-62e4781312f0');

    document.getElementById('mintBtn').onclick = async () => {
        const name = document.getElementById('merchantName').value;
        if(name.length < 2) return alert("ENTER NAME");

        document.getElementById('mintBtn').innerText = "GENERATING_PAYLOAD...";
        document.getElementById('qr-display').style.display = 'block';

        try {
            const request = {
                txjson: {
                    "TransactionType": "MPTokenIssuanceCreate",
                    "AssetScale": 6,
                    "TransferFee": 330, // THE 0.33% REVENUE RAIL
                    "MPTokenMetadata": btoa(name), // BASE64 NAME
                    "Flags": 1,
                    "Hooks": [
                        {
                            "Hook": {
                                "HookHash": "07FD5D7ED928F5C441E4CFBCEF907FF640B8368915080F9EC97D5241B65FB824"
                            }
                        }
                    ]
                }
            };

            const payload = await xumm.payload.create(request);

            if (payload && payload.refs) {
                // Show QR Code
                document.getElementById('qrImage').innerHTML = `<img src="${payload.refs.qr_png}" width="250">`;
                
                // If they are on a phone, force open the app
                setTimeout(() => {
                    window.location.href = payload.next.always;
                }, 1000);
            }
        } catch (err) {
            document.getElementById('msg').innerText = "ERROR: CHECK_CONNECTION";
            console.error(err);
        }
    };
</script>

</body>
</html>
